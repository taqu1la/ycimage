<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">YCImage</title>
  <desc id="desc">YCImage metallic YC monogram on a dark textured square.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0" stop-color="#3a3a38"/>
      <stop offset="0.42" stop-color="#171717"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="metal" x1="22%" y1="8%" x2="84%" y2="96%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#b8b8b8"/>
      <stop offset="0.35" stop-color="#f1f1ef"/>
      <stop offset="0.54" stop-color="#8e8e8c"/>
      <stop offset="0.72" stop-color="#d8d8d6"/>
      <stop offset="1" stop-color="#555553"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="7" flood-color="#000000" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#ffffff" flood-opacity="0.45"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="4" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>
  <rect width="256" height="256" rx="44" filter="url(#grain)" opacity="0.34"/>
  <g filter="url(#shadow)">
    <text x="125" y="151" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="132" font-weight="700" letter-spacing="-18"
      fill="url(#metal)">YC</text>
    <path d="M70 184c34 34 99 35 134-7" fill="none" stroke="url(#metal)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="128" y="222" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23" letter-spacing="12"
    fill="#d9d9d6">YC IMAGE</text>
</svg>
